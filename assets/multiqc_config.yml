report_comment: "This report has been generated by the ATAC/ChIP-seq analysis pipeline."
title: "ATAC-seq/ChIP-seq Analysis Report"

# --- 1. MODULE ORDER (With Anchors) ---
module_order:
  - fastqc:
      name: "FastQC (raw)"
      anchor: "raw_fastqc"
  - cutadapt:
      name: "Cutadapt (trimmed)"
      anchor: "trimming"
  - bowtie2:
      name: "Bowtie2 Alignment"
      anchor: "alignment"
  - samtools:
      name: "SAMTools Stats"
      anchor: "samtools_stats"
  - picard:
      name: "Picard Duplicates"
      anchor: "picard_dups"
  - deeptools:
      name: "deepTools QC"
      anchor: "deeptools_qc"
  - custom_content:
      anchor: "custom_results"

# --- 2. SECTION ORDER (The nf-core way) ---
# Invece di usare solo i numeri, concateniamo le sezioni usando 'before'
report_section_order:
  # Sezioni Custom agganciate prima di deepTools (come fa nf-core)
  homer_annotations:
    before: deeptools_qc
  frip_score:
    before: homer_annotations
  macs3_narrow_count:
    before: frip_score
  macs3_broad_count:
    before: macs3_narrow_count
  
  # Sezioni standard a fine report (ordine inverso con numeri alti negativi)
  software_versions:
    order: -3700
  "workflow-summary":
    order: -3800

# --- 3. CUSTOM DATA (Resta come lo avevi, ma controlla gli ID) ---
custom_data:
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
  homer_annotations:
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"

# --- 4. SEARCH PATTERNS ---
sp:
  cutadapt:
    fn: "*trimming_report.txt"
  deeptools/plotFingerprintOutRawCounts:
    fn: "*plotFingerprint*"
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"

# --- 5. CLEANUP ---
extra_fn_clean_exts:
  - ".FRiP"
  - ".homer_stats_mqc"
  - ".narrow_counts"
  - ".broad_counts"
  - "sorted.bam"
