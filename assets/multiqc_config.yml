report_comment: "Report generato dalla pipeline ATAC/ChIP-seq. Analisi della qualità, allineamento e peak calling."
title: "Analisi NGS: ChIP-seq/ATAC-seq"

# --- ORDINE DEI MODULI (MACRO) ---
# Questo determina la posizione dei software standard
module_order:
  - fastqc:
      name: 'Qualità Iniziale (FastQC)'
  - cutadapt:
      name: 'Trimming (TrimGalore)'
  - bowtie2:
      name: 'Allineamento (Bowtie2)'
  - picard:
      name: 'Duplicati (Picard)'
  - samtools:
      name: 'Statistiche Allineamento (Samtools)'
  - deeptools:
      name: 'Visualizzazione (DeepTools)'
  - macs3:
      name: 'Peak Calling (MACS3)'
  - custom_content:
      name: 'Statistiche Avanzate'

# --- ORDINE DELLE SEZIONI (DETTAGLIO) ---
# Qui forziamo l'ordine interno delle tue sezioni personalizzate
report_section_order:
  fastqc:
    order: -100
  trim_galore:
    order: -90
  bowtie2:
    order: -80
  macs3_narrow_count:
    order: -70
  macs3_broad_count:
    order: -60
  frip_score:
    order: -50
  peak_annotations:
    order: -40

# --- CONFIGURAZIONE DATI CUSTOM ---
custom_data:
  macs3_narrow_count:
    file_format: "tsv"
    section_name: "MACS3: Conteggio Peak Narrow"
    description: "Numero totale di picchi narrow identificati da MACS3."
    plot_type: "bargraph"
    pconfig:
      id: "macs3_narrow_plot"
      title: "Total Peak Count (Narrow)"
      ylab: "Number of Peaks"
      cpswitch: true

  macs3_broad_count:
    file_format: "tsv"
    section_name: "MACS3: Conteggio Peak Broad"
    description: "Numero totale di picchi broad identificati da MACS3."
    plot_type: "bargraph"
    pconfig:
      id: "macs3_broad_plot"
      title: "Total Peak Count (Broad)"
      ylab: "Number of Peaks"
      cpswitch: true

  frip_score:
    file_format: "tsv"
    section_name: "Qualità: FRiP Score"
    description: "Fraction of Reads in Peaks (FRiP): indica la frazione di reads allineate che cadono all'interno delle regioni di picco."
    plot_type: "bargraph"
    pconfig:
      id: "frip_score_bargraph"
      title: "FRiP Score per Campione"
      ylab: "FRiP Score"
      max: 1
      cpswitch: true

  peak_annotations:
    file_format: "tsv"
    section_name: "Annotazione: Distribuzione Genomica"
    description: "Distribuzione dei picchi sulle diverse feature genomiche calcolata da HOMER."
    plot_type: "bargraph"
    pconfig:
      id: "homer_peak_annotation_plot"
      title: "Distribuzione Picchi (Percentuale)"
      ylab: "Proportion"
      stacking: "percent"
      cpswitch: true
      colors:
        Intergenic: "#7cb5ec"
        TTS: "#434348"
        exon: "#f7a35c"
        intron: "#8085e9"
        "promoter-TSS": "#f15c80"

# --- REGOLE DI RICERCA FILE ---
sp:
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"
  frip_score:
    fn: "*.FRiP.txt"
  peak_annotations:
    fn: "*.stats.txt" # Assicurati che HOMER emetta un file con questo suffisso

# --- PULIZIA NOMI CAMPIONI ---
# Evita che nel report i nomi siano sporcati dalle estensioni dei file
sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"

# Escludi eventuali campioni di controllo (Input/IgG) dai grafici dei picchi se desiderato
# sample_names_ignore:
#   - "IgG_Control"
