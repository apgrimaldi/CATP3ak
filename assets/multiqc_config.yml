report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Integrated analysis of quality, alignment, and chromatin profiling."
title: "ATAC-seq/ChIP-seq Analysis Report"

exclude_modules:
  - macs2

module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - custom_content
  - deeptools

report_section_order:
  fastqc: {order: -100}
  cutadapt: {order: -200}
  bowtie2: {order: -300}
  samtools_stats: {order: -400}
  picard_markduplicates: {order: -500} # Corretto ID nativo (senza il secondo trattino basso)
  deeptools_plot_fingerprint_counts: {order: -550}
  frip_score: {order: -600}
  macs3_narrow_count: {order: -650}
  macs3_broad_count: {order: -700}
  lanceotron_peaks: {order: -750}
  homer_annotations_narrow: {order: -800}
  homer_annotations_broad: {order: -810}
  homer_annotations_lanceotron: {order: -815} # Aggiunta sezione per Lanceotron filtrato
  diffbind_heatmap: {order: -820}
  diffbind_pca_plot: {order: -830}
  diffbind_reproducibility: {order: -840}
  software_versions: {order: -1200}

custom_data:
  software_versions:
    section_name: "Software Versions"
  diffbind_heatmap:
    section_name: "DiffBind: Correlation Matrix Table"
    plot_type: "heatmap"
    pconfig:
      title: "Sample Correlation"
      decimalPlaces: 2
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
  lanceotron_peaks:
    section_name: "Lanceotron: Deep Learning Peaks"
    plot_type: "bargraph"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
  homer_annotations_narrow:
    section_name: "Annotation: Genomic Distribution (MACS3 Narrow)"
    plot_type: "bargraph"
  homer_annotations_broad:
    section_name: "Annotation: Genomic Distribution (MACS3 Broad)"
    plot_type: "bargraph"
  homer_annotations_lanceotron:
    section_name: "Annotation: Genomic Distribution (Lanceotron Filtrati)"
    plot_type: "bargraph"

sp:
  software_versions: {fn: "collated_versions.yml"}
  diffbind_heatmap: {fn: "diffbind_correlation_mqc.txt"}
  frip_score: {fn: "*.FRiP.txt"}
  macs3_narrow_count: {fn: "*.narrow_counts.txt"}
  macs3_broad_count: {fn: "*.broad_counts.txt"}
  lanceotron_peaks: {fn: "*.lanceotron_counts.txt"}
  # Separati i tre pattern di HOMER per evitare che si sovrascrivano a vicenda
  homer_annotations_narrow: {fn: "*.narrow.homer_stats_mqc.txt"}
  homer_annotations_broad: {fn: "*.broad.homer_stats_mqc.txt"}
  homer_annotations_lanceotron: {fn: "*.lanceotron.homer_stats_mqc.txt"}

sample_names_replace_suffixes:
  - ".plotFingerprint.qcmetrics"
  - ".plotFingerprint.raw"
  - ".narrow.homer_stats_mqc"
  - ".broad.homer_stats_mqc"
  - ".lanceotron.homer_stats_mqc"
  - ".narrow_counts"
  - ".broad_counts"
  - ".lanceotron_counts"
  - ".FRiP"
  - ".stats"
  - ".flagstat"
  - ".idxstats"
  - ".metrics"
  - ".removed"
  - ".sorted"
  - ".filtered"
