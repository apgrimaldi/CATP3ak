report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Integrated analysis of quality, alignment, and chromatin profiling."
title: "ATAC-seq/ChIP-seq Analysis Report"

# Disattiviamo l'analisi di MACS2 nativa per non sovrapporsi con i tuoi grafici custom di MACS3
exclude_modules:
  - macs2

# ==============================================================================
# 1. ORDINE DEI MODULI PRINCIPALI
# ==============================================================================
module_order:
  - fastqc:
      name: "FastQC (Raw Reads)"
      info: "Controllo qualità iniziale delle sequenze."
  - cutadapt:
      name: "Trim Galore"
      info: "Rimozione degli adattatori e filtraggio per qualità."
  - bowtie2:
      name: "Bowtie2 Alignment"
      info: "Tassi di allineamento sul genoma di riferimento."
  - picard:
      name: "Picard MarkDuplicates"
      info: "Identificazione e livello di duplicazione PCR/ottica."
      anchor: "module_picard" # Ancora per agganciare le cose dopo Picard
  - samtools:
      name: "Samtools Stats"
      info: "Statistiche sugli allineamenti finali post-filtraggio."
      anchor: "module_samtools"
  - custom_content:
      name: "Peak Calling & Downstream Analysis"
      anchor: "module_custom"
  - deeptools:
      name: "DeepTools"
      anchor: "module_deeptools"

# ==============================================================================
# 2. ORDINE DELLE SEZIONI CUSTOM (IL METODO NF-CORE)
# ==============================================================================
# Invece dei numeri, diciamo a MultiQC esattamente "cosa va prima di cosa"
report_section_order:
  deeptools_plot_fingerprint_counts:
    before: module_custom
  frip_score:
    before: deeptools_plot_fingerprint_counts
  macs3_narrow_count:
    before: frip_score
  macs3_broad_count:
    before: macs3_narrow_count
  lanceotron_peaks:
    before: macs3_broad_count
  homer_annotations_narrow:
    before: lanceotron_peaks
  homer_annotations_broad:
    before: homer_annotations_narrow
  homer_annotations_lanceotron:
    before: homer_annotations_broad
  diffbind_heatmap:
    before: homer_annotations_lanceotron
  diffbind_pca_plot:
    before: diffbind_heatmap
  diffbind_reproducibility:
    before: diffbind_pca_plot
  macs3_profileplyr:
    before: diffbind_reproducibility
  lanceotron_profileplyr:
    before: macs3_profileplyr
  software_versions:
    order: -1000 # Questo lo spingiamo sempre in fondo con un numero bassissimo

# ==============================================================================
# 3. IMPOSTAZIONI GRAFICI CUSTOM
# ==============================================================================
custom_data:
  software_versions:
    section_name: "Software Versions"
  diffbind_heatmap:
    section_name: "DiffBind: Correlation Matrix Table"
    plot_type: "heatmap"
    pconfig:
      title: "Sample Correlation"
      decimalPlaces: 2
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
  lanceotron_peaks:
    section_name: "Lanceotron: Deep Learning Peaks"
    plot_type: "bargraph"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
  homer_annotations_narrow:
    section_name: "Annotation: Genomic Distribution (MACS3 Narrow)"
    plot_type: "bargraph"
  homer_annotations_broad:
    section_name: "Annotation: Genomic Distribution (MACS3 Broad)"
    plot_type: "bargraph"
  homer_annotations_lanceotron:
    section_name: "Annotation: Genomic Distribution (Lanceotron)"
    plot_type: "bargraph"

# ==============================================================================
# 4. PATTERN DI RICERCA DEI FILE
# ==============================================================================
sp:
  software_versions: {fn: "collated_versions.yml"}
  diffbind_heatmap: {fn: "diffbind_correlation_mqc.txt"}
  frip_score: {fn: "*.FRiP.txt"}
  macs3_narrow_count: {fn: "*.narrow_counts.txt"}
  macs3_broad_count: {fn: "*.broad_counts.txt"}
  lanceotron_peaks: {fn: "*.lanceotron_counts.txt"}
  homer_annotations_narrow: {fn: "*.narrow.homer_stats_mqc.txt"}
  homer_annotations_broad: {fn: "*.broad.homer_stats_mqc.txt"}
  homer_annotations_lanceotron: {fn: "*.lanceotron.homer_stats_mqc.txt"}

# ==============================================================================
# 5. IL "BISTURI" NF-CORE (FUSIONE DEI CAMPIONI NELLA TABELLA)
# ==============================================================================
extra_fn_clean_exts:
  - ".plotFingerprint.qcmetrics"
  - ".plotFingerprint.raw"
  - ".narrow.homer_stats_mqc"
  - ".broad.homer_stats_mqc"
  - ".lanceotron.homer_stats_mqc"
  - ".narrow_counts"
  - ".broad_counts"
  - ".lanceotron_counts"
  - ".FRiP"
  - ".stats"
  - ".flagstat"
  - ".idxstats"
  - ".metrics"
  - ".removed"
  - ".sorted"
  - ".filtered"
  - ".markdup"
  - ".rmdup"
  - "_val_1"
  - "_val_2"
  - "_R1_001"
  - "_R2_001"
  - "_R1"
  - "_R2"
  - ".fastq.gz"
  - ".fq.gz"
  - "_peaks"
  - ".display.bw"
  - ".bw"
